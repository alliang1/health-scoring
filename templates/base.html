<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Customer Health{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .search-box { max-width: 600px; margin: 0 auto; }
        .badge-healthy { background-color: #198754; }
        .badge-at-risk { background-color: #ffc107; color: #000; }
        .badge-critical { background-color: #dc3545; }
        .score-healthy { color: #198754; }
        .score-at-risk { color: #b58900; }
        .score-critical { color: #dc3545; }
        .summary-card { border-left: 4px solid; padding: 1rem; margin-bottom: 1rem; }
        .summary-card-danger { border-color: #dc3545; }
        .summary-card-warning { border-color: #ffc107; }
        .summary-card-info { border-color: #0dcaf0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">Nexus Customer Health</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('customers') }}">Customers</a>
                <a class="nav-link" href="{{ url_for('alerts') }}">Alerts</a>
                <a class="nav-link" href="{{ url_for('search') }}">Search</a>
                <a class="nav-link" href="{{ url_for('source_data') }}">Source Data</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
